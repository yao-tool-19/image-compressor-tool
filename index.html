<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免费在线图片压缩工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.6;
            color: #333;
        }
        .ad-slot {
            background: #f5f5f5;
            border: 1px dashed #ccc;
            padding: 2rem;
            text-align: center;
            color: #999;
            margin: 1rem 0;
            border-radius: 4px;
        }
        .tips-top {
            color: #e53e3e;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        .safe-tip {
            color: #22a75d;
            margin-bottom: 1rem;
        }
        .guide-box {
            background: #f5f5f5;
            padding: 0.8rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
        .quality-wrap {
            margin: 1.2rem 0;
        }
        .quality-wrap label {
            display: block;
            margin-bottom: 0.5rem;
        }
        #quality {
            width: 100%;
        }
        .upload-box {
            border: 2px dashed #999;
            border-radius: 8px;
            padding: 3rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-box:hover {
            border-color: #333;
            background: #fafafa;
        }
        #fileInput {
            display: none;
        }
        .result-title {
            font-size: 1.2rem;
            margin: 2rem 0 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }
        .result-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .item-card {
            border: 1px solid #eee;
            padding: 0.8rem;
            border-radius: 6px;
            text-align: center;
        }
        .item-card img {
            max-width: 100%;
            height: 120px;
            object-fit: contain;
            margin-bottom: 0.5rem;
        }
        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        .bottom-ad {
            margin-top: 3rem;
            padding: 1rem 0;
            border-top: 1px solid #eee;
        }
        .size-compare {
            font-size: 12px;
            margin: 0.3rem 0;
        }
        .original-size {
            color: #666;
        }
        .compressed-size {
            color: #22a75d;
            font-weight: bold;
        }
        .reduction-percent {
            color: #996;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <!-- 顶部广告位 -->
    <div class="ad-slot">
        顶部广告位（AdSense Top Ad Slot）
    </div>

    <h1>免费在线图片压缩工具</h1>
    <p>支持 JPG、PNG、WebP 格式 | 单张最大 10MB</p>
    <p class="tips-top">⚠️ 微信/QQ内置浏览器可能无法正常使用，请用手机自带浏览器、Chrome、Edge打开</p>
    <p class="safe-tip">✅ 图片全程在本地浏览器处理，不上传服务器，保护隐私，无水印、无需注册</p>

    <div class="guide-box">
        📌 使用步骤：1.上传图片 → 2.自动压缩 → 3.点击下载
    </div>

    <div class="quality-wrap">
        <label>压缩画质（数值越高，画质越好、文件越大，推荐70%）</label>
        <input type="range" id="quality" min="10" max="100" value="70" step="10">
        <span id="qualityValue">70%</span>
    </div>

    <div class="upload-box" id="uploadBox">
        <p>📁 点击此处 或 直接拖拽图片到框内上传</p>
        <input type="file" id="fileInput" multiple accept="image/*">
    </div>

    <h3 class="result-title">压缩结果</h3>
    <div class="result-list" id="resultList"></div>

    <button class="btn" id="downloadAll">一键下载全部图片</button>

    <!-- 底部广告位 -->
    <div class="bottom-ad ad-slot">
        底部广告位（AdSense Bottom Ad Slot）
    </div>

    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const resultList = document.getElementById('resultList');
        const downloadAllBtn = document.getElementById('downloadAll');

        let compressedFiles = [];

        // 单位自动转换函数（KB/MB）
        function formatSize(bytes) {
            if (bytes >= 1024 * 1024) {
                return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
            } else {
                return (bytes / 1024).toFixed(1) + ' KB';
            }
        }

        // 画质数值同步
        qualitySlider.addEventListener('input', () => {
            qualityValue.textContent = qualitySlider.value + '%';
        });

        // 点击上传
        uploadBox.addEventListener('click', () => fileInput.click());

        // 拖拽上传
        uploadBox.addEventListener('dragover', e => e.preventDefault());
        uploadBox.addEventListener('drop', e => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            handleFiles(files);
        });

        // 选择文件
        fileInput.addEventListener('change', () => {
            handleFiles(fileInput.files);
        });

        // 处理图片压缩（新增：接收原始文件大小）
        function handleFiles(files) {
            compressedFiles = [];
            resultList.innerHTML = '';
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = e => {
                    compressImage(e.target.result, file.name, qualitySlider.value / 100, file.size);
                };
            });
        }

        // 核心压缩逻辑（新增：接收并传递原始文件大小）
        function compressImage(base64, fileName, quality, originalSize) {
            const img = new Image();
            img.src = base64;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const outputType = 'image/jpeg';
                const compressedBase64 = canvas.toDataURL(outputType, quality);
                const file = dataURLtoFile(compressedBase64, fileName);
                compressedFiles.push({ file, base64: compressedBase64, name: fileName });
                // 调用时传入原始大小和压缩后大小
                renderItem(file, compressedBase64, fileName, originalSize);
            };
        }

        // 渲染单条结果（新增：显示前后大小对比）
        function renderItem(file, base64, name, originalSize) {
            const compressedSize = file.size;
            const reductionBytes = originalSize - compressedSize;
            const reductionPercent = Math.round((1 - compressedSize / originalSize) * 100);

            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerHTML = `
                <img src="${base64}" alt="${name}">
                <p style="font-size:14px;margin:0.3rem 0;">${name}</p>
                <p class="size-compare original-size">原大小：${formatSize(originalSize)}</p>
                <p class="size-compare compressed-size">压缩后：${formatSize(compressedSize)}</p>
                <p class="size-compare reduction-percent">减少：${formatSize(reductionBytes)}（约 ${reductionPercent}%）</p>
                <a class="btn" href="${base64}" download="${name}">下载</a>
            `;
            resultList.appendChild(div);
        }

        // base64 转文件
        function dataURLtoFile(dataurl, filename) {
            let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1];
            let bstr = atob(arr[1]);
            let n = bstr.length;
            let u8arr = new Uint8Array(n);
            while(n--){ u8arr[n] = bstr.charCodeAt(n); }
            return new File([u8arr], filename, {type:mime});
        }

        // 批量下载
        downloadAllBtn.addEventListener('click', () => {
            if(compressedFiles.length === 0) return alert('请先上传图片');
            compressedFiles.forEach((item, index) => {
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = item.base64;
                    a.download = item.name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }, index * 500); // 延迟下载，避免浏览器拦截
            });
        });
    </script>
</body>
</html>
